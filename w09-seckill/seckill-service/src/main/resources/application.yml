server:
  port: 8084
  tomcat:
    threads:
      max: 500
      min-spare: 50
    accept-count: 200
spring:
  application:
    name: seckill-service
  datasource:
    url: jdbc:mysql://localhost:3306/kungfu_seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 10
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      batch-size: 16384
      buffer-memory: 33554432
      properties:
        linger.ms: 5
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
