server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: stock-service
          uri: lb://stock-service
          predicates:
            - Path=/api/stock/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@ipKeyResolver}"
  redis:
    host: localhost
    port: 6379
